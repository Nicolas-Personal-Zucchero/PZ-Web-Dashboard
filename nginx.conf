server {
    listen 80;
    server_name personalzucchero.local personalzucchero-server.local localhost 127.0.0.1;

    location / {
        proxy_pass http://pz-dashboard:5000;
        
        # Inoltro degli header essenziali all'application server
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ottimizzazione: serving diretto dei file statici da parte di Nginx (richiede il mount dei volumi corrispondenti)
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 5d;
        add_header Cache-Control "public, no-transform";
    }
}